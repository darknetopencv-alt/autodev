<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>autodev - 项目管理面板</title>
  <style>
    :root {
      --bg-app: #0e0e0e;
      --bg-sidebar: #131316;
      --bg-panel: #1a1a1f;
      --bg-panel-hover: #222228;
      --bg-selected: #2a2a35;
      --border-color: #27272a;
      --text-main: #f3f4f6;
      --text-muted: #a1a1aa;
      --accent-purple: #8b5cf6;
      --accent-blue: #3b82f6;
      --btn-primary-bg: #ffffff;
      --btn-primary-text: #000000;

      --running: #2dd4bf;
      --completed: #22c55e;
      --blocked: #f97316;
      --pending: #60a5fa;
      --waiting: #facc15;
      --idle: #94a3b8;
      --planning: #818cf8;
      --danger: #ef4444;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Inter", "IBM Plex Sans", "Segoe UI", sans-serif;
      background: var(--bg-app);
      color: var(--text-main);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* Scrollbars */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #555;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background: var(--bg-panel);
      color: var(--text-main);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .btn:hover {
      background: var(--bg-panel-hover);
      border-color: #3f3f46;
    }

    .btn-primary {
      background: var(--btn-primary-bg);
      color: var(--btn-primary-text);
      border-color: transparent;
      font-weight: 600;
    }

    .btn-primary:hover {
      background: #e5e5e5;
      border-color: transparent;
    }

    .btn-danger {
      color: var(--danger);
      border-color: rgba(239, 68, 68, 0.5);
    }

    .btn-danger:hover {
      background: rgba(239, 68, 68, 0.1);
      border-color: var(--danger);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Badges */
    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      border: 1px solid currentColor;
    }

    .badge-running {
      color: var(--running);
      background: rgba(45, 212, 191, 0.1);
    }

    .badge-completed {
      color: var(--completed);
      background: rgba(34, 197, 94, 0.1);
    }

    .badge-blocked {
      color: var(--blocked);
      background: rgba(249, 115, 22, 0.1);
    }

    .badge-pending {
      color: var(--pending);
      background: rgba(96, 165, 250, 0.1);
    }

    .badge-waiting {
      color: var(--waiting);
      background: rgba(250, 204, 21, 0.1);
    }

    .badge-idle {
      color: var(--idle);
      background: rgba(148, 163, 184, 0.1);
    }

    .badge-planning {
      color: var(--planning);
      background: rgba(129, 140, 248, 0.1);
    }

    /* Sidebar */
    .sidebar {
      width: 280px;
      min-width: 280px;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      border-bottom: 1px solid var(--border-color);
    }

    .user-profile {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #ffffff;
      color: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
    }

    .user-info {
      display: flex;
      flex-direction: column;
    }

    .user-name {
      font-size: 14px;
      font-weight: 600;
    }

    .workspace-label {
      font-size: 12px;
      color: var(--text-muted);
    }

    .btn-new-project {
      width: 100%;
      justify-content: center;
      padding: 10px;
      border-radius: 8px;
    }

    .sidebar-nav {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .nav-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin: 12px 0 8px 8px;
    }

    .project-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .project-item:hover {
      background: var(--bg-panel-hover);
      color: var(--text-main);
    }

    .project-item.active {
      background: var(--bg-selected);
      color: var(--text-main);
    }

    .project-item-name {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .project-item-icon {
      color: var(--text-muted);
      font-size: 14px;
    }

    .project-item.active .project-item-icon {
      color: var(--accent-purple);
    }

    .sidebar-footer {
      padding: 16px;
      border-top: 1px solid var(--border-color);
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
    }

    /* Main Area */
    .main-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-app);
      position: relative;
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      text-align: center;
    }

    .empty-state h2 {
      font-size: 20px;
      font-weight: 500;
      margin-bottom: 12px;
      color: var(--text-main);
    }

    .detail-view {
      display: none;
      flex-direction: column;
      height: 100%;
    }

    .detail-view.active {
      display: flex;
    }

    .main-header {
      padding: 20px 32px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--bg-app);
      z-index: 10;
    }

    .title-group {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .main-title {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .scroll-content {
      flex: 1;
      overflow-y: auto;
      padding: 32px;
    }

    /* Stats */
    .stats-row {
      display: flex;
      gap: 16px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }

    .stat-card {
      background: var(--bg-panel);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 16px 20px;
      flex: 1;
      min-width: 140px;
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 8px;
      font-weight: 500;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 600;
      color: var(--text-main);
    }

    /* Execution Blocks (Like the antigravity execution plan) */
    .execution-plan {
      background: var(--bg-panel);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      margin-bottom: 24px;
      overflow: hidden;
    }

    .execution-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255, 255, 255, 0.02);
    }

    .execution-badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.05em;
      padding: 2px 6px;
      border-radius: 4px;
      background: rgba(139, 92, 246, 0.15);
      color: var(--accent-purple);
      text-transform: uppercase;
    }

    .execution-title {
      font-size: 14px;
      font-weight: 600;
    }

    .execution-body {
      padding: 16px;
      color: var(--text-muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .execution-body strong {
      color: var(--text-main);
    }

    .current-task-detail {
      padding-left: 12px;
      border-left: 2px solid var(--accent-purple);
      margin-top: 8px;
    }

    /* Grid layout for Task Queue & Logs */
    .content-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    @media (max-width: 1024px) {
      .content-grid {
        grid-template-columns: 1fr;
      }
    }

    .task-queue-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .task-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 8px;
      border: 1px solid var(--border-color);
    }

    .task-item-title {
      font-size: 13px;
      font-weight: 500;
    }

    .task-item-id {
      font-size: 11px;
      color: var(--text-muted);
      font-family: monospace;
    }

    /* Logs */
    .terminal {
      background: #000;
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 16px;
      font-family: "JetBrains Mono", "Fira Code", monospace;
      font-size: 12px;
      line-height: 1.6;
      height: 500px;
      overflow-y: auto;
      color: #a1a1aa;
    }

    .terminal-line {
      margin-bottom: 2px;
      word-break: break-all;
    }

    .terminal-line:last-child {
      margin-bottom: 0;
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: var(--bg-sidebar);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 24px;
      width: 480px;
      max-width: 90vw;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }

    .modal h2 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text-muted);
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background: var(--bg-app);
      color: var(--text-main);
      font-size: 13px;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    .form-group textarea {
      min-height: 100px;
      resize: vertical;
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--accent-purple);
    }

    .form-check {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }

    .form-check input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--accent-purple);
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 24px;
    }

    .form-error {
      color: var(--danger);
      font-size: 12px;
      margin-top: 6px;
      display: none;
    }

    /* Toasts */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 2000;
      background: var(--bg-panel);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
      transition: all 0.3s;
      opacity: 0;
      transform: translateY(10px);
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.error {
      border-left: 3px solid var(--danger);
    }

    .toast.success {
      border-left: 3px solid var(--completed);
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid var(--border-color);
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="user-profile">
        <div class="avatar">A</div>
        <div class="user-info">
          <div class="user-name">Auto-Dev CLI</div>
          <div class="workspace-label">Local Workspace</div>
        </div>
      </div>
      <button class="btn btn-primary btn-new-project" onclick="openNewProjectModal()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 5v14M5 12h14" />
        </svg>
        新建项目
      </button>
    </div>

    <div class="nav-label">Projects</div>
    <div class="sidebar-nav" id="sidebar-projects">
      <!-- Projects rendered here -->
    </div>

    <div class="sidebar-footer">
      <span id="session-count">0 个活跃会话</span>
      <span style="display:flex; gap:8px;">
        <span style="width:8px;height:8px;border-radius:50%;background:var(--completed);margin-top:4px;"></span>
        Connected
      </span>
    </div>
  </aside>

  <!-- Main Area -->
  <main class="main-area">

    <div id="empty-state" class="empty-state">
      <h2>欢迎使用 Auto-Dev</h2>
      <p>请在左侧选择一个项目，或者点击新建项目开始。</p>
    </div>

    <div id="detail-view" class="detail-view">
      <header class="main-header">
        <div class="title-group">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            style="color:var(--accent-purple)">
            <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
            <line x1="8" y1="21" x2="16" y2="21"></line>
            <line x1="12" y1="17" x2="12" y2="21"></line>
          </svg>
          <h1 class="main-title" id="project-title">Project Name</h1>
          <span id="project-badge" class="badge">Idle</span>
        </div>
        <div class="header-actions">
          <button class="btn" id="btn-start" onclick="startCurrentProject()">▶ 启动</button>
          <button class="btn btn-danger" id="btn-stop" onclick="stopCurrentProject()">■ 停止</button>
        </div>
      </header>

      <div class="scroll-content">
        <!-- Stats Row -->
        <div class="stats-row">
          <div class="stat-card">
            <div class="stat-label">总进度</div>
            <div class="stat-value" id="stat-progress">0%</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">已完成任务</div>
            <div class="stat-value" id="stat-completed">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">总任务数</div>
            <div class="stat-value" id="stat-total">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">当前轮次</div>
            <div class="stat-value" id="stat-epoch">1/1</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">后端模型</div>
            <div class="stat-value" id="stat-backend" style="font-size:16px; margin-top:6px;">codex</div>
          </div>
        </div>

        <div class="content-grid">
          <!-- Left Column -->
          <div>
            <div class="execution-plan">
              <div class="execution-header">
                <span class="execution-badge">EXECUTION</span>
                <span class="execution-title">当前任务 / Current Task</span>
              </div>
              <div class="execution-body" id="current-task-body">
                <div style="color:var(--text-muted)">当前没有正在执行的任务...</div>
              </div>
            </div>

            <div class="execution-plan">
              <div class="execution-header" style="background:transparent; border:none; padding-bottom:0;">
                <span class="execution-title" style="color:var(--text-muted); font-size:12px;">任务队列 (Queue)</span>
              </div>
              <div class="execution-body task-queue-list" id="task-queue-list">
                <!-- Task rows go here -->
              </div>
            </div>
          </div>

          <!-- Right Column -->
          <div>
            <div class="execution-plan" style="background:#000;">
              <div class="execution-header" style="border-bottom-color:#333;">
                <span class="execution-badge"
                  style="background:rgba(59,130,246,0.15); color:var(--accent-blue);">TERMINAL</span>
                <span class="execution-title">运行日志</span>
              </div>
              <div class="terminal" id="log-content">
                <!-- log output -->
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- New Project Modal -->
  <div id="new-project-modal" class="modal-overlay" onclick="closeModalOnOverlay(event)">
    <div class="modal">
      <h2>新建项目</h2>
      <div class="form-group">
        <label>项目目录 Directory</label>
        <input type="text" id="project-directory" placeholder="e.g. /home/user/projects/my-app" autocomplete="off">
        <div class="form-error" id="dir-error"></div>
      </div>
      <div class="form-group">
        <label>开发说明 / 需求 Intent</label>
        <textarea id="project-intent" placeholder="描述你想要构建的项目..."></textarea>
      </div>
      <div class="form-group">
        <label>AI 后端 Backend</label>
        <select id="project-backend">
          <option value="codex">Codex</option>
          <option value="claude">Claude</option>
          <option value="gemini">Gemini</option>
          <option value="opencode">OpenCode</option>
        </select>
      </div>
      <div class="form-group" style="margin-top:20px;">
        <div class="form-check">
          <input type="checkbox" id="project-autostart" checked>
          <label for="project-autostart" style="margin:0; font-weight:500;">创建后自动开始执行 (Auto-start)</label>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn" onclick="closeNewProjectModal()">取消 (Cancel)</button>
        <button class="btn btn-primary" id="create-btn" onclick="createProject()">创建项目 (Create)</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script>
    const API = '';
    let currentProject = null;
    let refreshTimer = null;
    let globalProjects = [];

    // ==================== API Calls ====================
    async function apiGet(path) {
      const resp = await fetch(API + path);
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({ detail: resp.statusText }));
        throw new Error(err.detail || resp.statusText);
      }
      return resp.json();
    }

    async function apiPost(path, body) {
      const resp = await fetch(API + path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({ detail: resp.statusText }));
        throw new Error(err.detail || resp.statusText);
      }
      return resp.json();
    }

    // ==================== Sidebar List View ====================
    async function loadProjects() {
      try {
        const data = await apiGet('/api/projects');
        globalProjects = data.projects || [];
        renderSidebarProjects(globalProjects);
        document.getElementById('session-count').textContent = `${data.active_sessions || 0} 个活跃会话`;

        // If a project is currently open, verify it still exists
        if (currentProject) {
          const exists = globalProjects.find(p => p.name === currentProject);
          if (!exists) {
            closeDetailView();
          }
        }
      } catch (e) {
        console.error('Failed to load projects:', e);
      }
    }

    function renderSidebarProjects(projects) {
      const nav = document.getElementById('sidebar-projects');
      if (!projects || projects.length === 0) {
        nav.innerHTML = '<div style="padding:12px; color:var(--text-muted); font-size:12px;">暂无项目</div>';
        return;
      }

      nav.innerHTML = projects.map(p => {
        const isActive = p.name === currentProject;
        return `
          <div class="project-item ${isActive ? 'active' : ''}" onclick="selectProject('${esc(p.name)}')">
            <div class="project-item-name">
              <svg class="project-item-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
              ${esc(p.name)}
            </div>
            ${p.session_alive ? '<span style="width:6px;height:6px;border-radius:50%;background:var(--running);"></span>' : ''}
          </div>
        `;
      }).join('');
    }

    // ==================== Detail View ====================
    function selectProject(name) {
      currentProject = name;
      renderSidebarProjects(globalProjects); // update active state in sidebar

      document.getElementById('empty-state').style.display = 'none';
      document.getElementById('detail-view').classList.add('active');

      document.getElementById('project-title').textContent = name;

      // Clear current data while loading
      document.getElementById('log-content').innerHTML = 'Loading...';

      startDetailRefresh();
      loadProjectDetail(name);
    }

    function closeDetailView() {
      currentProject = null;
      document.getElementById('detail-view').classList.remove('active');
      document.getElementById('empty-state').style.display = 'flex';
      renderSidebarProjects(globalProjects);
      stopDetailRefresh();
    }

    function startDetailRefresh() {
      stopDetailRefresh();
      refreshTimer = setInterval(() => {
        if (currentProject) loadProjectDetail(currentProject);
      }, 2000);
    }

    function stopDetailRefresh() {
      if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; }
    }

    const statusLabels = {
      idle: '空闲 Idle', starting: '启动中 Starting', running: '运行中 Running', validating: '验证中 Validating',
      completed: '已完成 Completed', blocked: '已阻塞 Blocked', pending: '等待中 Pending',
      planning: '规划中 Planning', waiting: '等待中 Waiting',
    };
    const badgeClasses = {
      idle: 'badge-idle', starting: 'badge-running', running: 'badge-running',
      validating: 'badge-running', completed: 'badge-completed', blocked: 'badge-blocked',
      pending: 'badge-pending', planning: 'badge-planning', waiting: 'badge-waiting',
    };

    async function loadProjectDetail(name) {
      try {
        const [status, tasks, logData] = await Promise.all([
          apiGet(`/api/projects/${encodeURIComponent(name)}/status`),
          apiGet(`/api/projects/${encodeURIComponent(name)}/tasks`).catch(() => ({ tasks: [] })),
          apiGet(`/api/projects/${encodeURIComponent(name)}/log`).catch(() => ({ lines: [] })),
        ]);
        if (currentProject !== name) return; // switched away during await
        renderDetailView(name, status, tasks, logData);
      } catch (e) {
        console.error('Failed to load detail:', e);
      }
    }

    function renderDetailView(name, status, tasks, logData) {
      const run = status.run || {};
      const counts = status.counts || {};
      const runStatus = status.session_alive ? (run.status || 'running') : (run.status || 'idle');

      const statusLabel = statusLabels[runStatus] || runStatus;
      const badgeClass = badgeClasses[runStatus] || 'badge-idle';

      const total = counts.total || 0;
      const completed = counts.completed || 0;
      const pct = total > 0 ? Math.round(completed / total * 100) : 0;

      // Header update
      const badgeEl = document.getElementById('project-badge');
      badgeEl.className = `badge ${badgeClass}`;
      badgeEl.textContent = statusLabel;

      document.getElementById('btn-start').disabled = status.session_alive;
      document.getElementById('btn-stop').disabled = !status.session_alive;

      // Stats update
      document.getElementById('stat-progress').textContent = `${pct}%`;
      document.getElementById('stat-completed').textContent = completed;
      document.getElementById('stat-total').textContent = total;
      document.getElementById('stat-epoch').textContent = `${run.current_epoch || 1}/${run.max_epochs || 1}`;
      document.getElementById('stat-backend').textContent = status.backend || 'codex';

      // Current Task
      const curTaskEl = document.getElementById('current-task-body');
      if (run.current_task_id) {
        curTaskEl.innerHTML = `
           <div style="font-size:11px; font-family:monospace; color:var(--text-muted); margin-bottom:4px;">${esc(run.current_task_id)}</div>
           <strong style="font-size:14px;">${esc(run.current_task_title || 'Undisclosed Task')}</strong>
           <div class="current-task-detail">
             <div>尝试 (Attempt): ${run.current_attempt || 0}/${run.max_attempts || 0}</div>
             <div>耗时 (Elapsed): ${run.heartbeat_elapsed_seconds || 0}s</div>
           </div>
         `;
      } else {
        curTaskEl.innerHTML = `<div style="color:var(--text-muted)">Project is currently resting...</div>`;
      }

      // Task Queue
      const queueEl = document.getElementById('task-queue-list');
      const taskRows = (tasks.tasks || []).map(t => {
        const ts = t.status || 'pending';
        const tLabel = statusLabels[ts] || ts;
        const tBadge = badgeClasses[ts] || 'badge-pending';
        return `
          <div class="task-item">
            <div>
              <div class="task-item-title">${esc(t.title || t.name || '')}</div>
              <div class="task-item-id">${esc(t.id || '')}</div>
            </div>
            <span class="badge ${tBadge}">${tLabel}</span>
          </div>
        `;
      }).join('');
      queueEl.innerHTML = taskRows || '<div style="color:var(--text-muted); padding:12px 0;">No tasks in queue</div>';

      // Log
      const logEl = document.getElementById('log-content');
      const isScrolledToBottom = logEl.scrollHeight - logEl.clientHeight <= logEl.scrollTop + 20;

      const logLines = (logData.lines || []).map(line => `<div class="terminal-line">${esc(line)}</div>`).join('');
      logEl.innerHTML = logLines || 'Waiting for output...';

      if (isScrolledToBottom) {
        logEl.scrollTop = logEl.scrollHeight;
      }
    }

    // ==================== Actions ====================
    async function startCurrentProject() {
      if (!currentProject) return;
      try {
        await apiPost(`/api/projects/${encodeURIComponent(currentProject)}/start`, {});
        showToast(`Started project: ${currentProject}`, 'success');
        setTimeout(() => loadProjectDetail(currentProject), 500);
        setTimeout(loadProjects, 500);
      } catch (e) {
        showToast('Failed to start: ' + e.message, 'error');
      }
    }

    async function stopCurrentProject() {
      if (!currentProject) return;
      try {
        await apiPost(`/api/projects/${encodeURIComponent(currentProject)}/stop`, {});
        showToast(`Stopped project: ${currentProject}`, 'success');
        setTimeout(() => loadProjectDetail(currentProject), 500);
        setTimeout(loadProjects, 500);
      } catch (e) {
        showToast('Failed to stop: ' + e.message, 'error');
      }
    }

    // ==================== Modal ====================
    function openNewProjectModal() {
      document.getElementById('new-project-modal').classList.add('active');
      document.getElementById('project-directory').focus();
    }

    function closeNewProjectModal() {
      document.getElementById('new-project-modal').classList.remove('active');
      document.getElementById('project-directory').value = '';
      document.getElementById('project-intent').value = '';
      document.getElementById('dir-error').style.display = 'none';
    }

    function closeModalOnOverlay(e) {
      if (e.target === e.currentTarget) closeNewProjectModal();
    }

    async function createProject() {
      const directory = document.getElementById('project-directory').value.trim();
      const intent = document.getElementById('project-intent').value.trim();
      const backend = document.getElementById('project-backend').value;
      const autostart = document.getElementById('project-autostart').checked;

      if (!directory) {
        document.getElementById('dir-error').textContent = 'Please enter project directory path';
        document.getElementById('dir-error').style.display = 'block';
        return;
      }

      const btn = document.getElementById('create-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> 创建中...';

      try {
        const result = await apiPost('/api/projects', { directory, intent, backend, auto_start: autostart });
        showToast(`Created project: ${result.name}`, 'success');
        closeNewProjectModal();
        await loadProjects();
        selectProject(result.name); // automatically select it
      } catch (e) {
        showToast('创建失败 (Create failed): ' + e.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = '创建项目 (Create)';
      }
    }

    // ==================== Utils ====================
    function esc(s) {
      if (s === null || s === undefined) return '';
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function showToast(msg, type) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = `toast ${type || ''} show`;
      setTimeout(() => { toast.className = 'toast'; }, 4000);
    }

    // Init
    loadProjects();
    setInterval(() => {
      loadProjects();
    }, 4000);
  </script>
</body>

</html>
